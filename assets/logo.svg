<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 280" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0B1120"/>
    </linearGradient>
    <linearGradient id="star" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="40%" stop-color="#FACC15"/>
      <stop offset="100%" stop-color="#EAB308"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0"/>
      <stop offset="15%" stop-color="#6366F1" stop-opacity="0.8"/>
      <stop offset="85%" stop-color="#6366F1" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1600" height="280" rx="10" fill="url(#bg)"/>
  <rect x="0" y="0" width="1600" height="280" rx="10" stroke="#1E293B" stroke-width="1.5"/>

  <!-- Polaris star icon -->
  <g transform="translate(100, 110)">
    <circle cx="0" cy="0" r="30" fill="#FDE68A" opacity="0.06"/>
    <circle cx="0" cy="0" r="18" fill="#FDE68A" opacity="0.12"/>
    <polygon points="0,-30 8,-8 30,0 8,8 0,30 -8,8 -30,0 -8,-8" fill="url(#star)" opacity="0.95"/>
    <polygon points="0,-10 6,0 0,10 -6,0" fill="#FFF7ED" opacity="0.9"/>
  </g>

  <!-- ✦ Polaris Agent — main title -->
  <text x="158" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="800" fill="#F8FAFC" letter-spacing="4">✦ Polaris Agent</text>

  <!-- Tagline -->
  <text x="158" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="21" fill="#94A3B8" letter-spacing="2">Navigate Complexity with AI</text>

  <!-- Accent divider -->
  <line x1="158" y1="175" x2="1470" y2="175" stroke="url(#accent)" stroke-width="1.5"/>

  <!-- Framework description -->
  <text x="158" y="212" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#64748B" letter-spacing="1">Autonomous Agent Framework — OODA Loop · MCP · A2A · 26 Tools</text>

  <!-- Bottom provider line -->
  <text x="158" y="248" font-family="monospace" font-size="12" fill="#475569" letter-spacing="0.5">OPENAI · ANTHROPIC · OLLAMA · vLLM</text>
</svg>