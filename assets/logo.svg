<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0B1120"/>
    </linearGradient>
    <linearGradient id="star" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="40%" stop-color="#FACC15"/>
      <stop offset="100%" stop-color="#EAB308"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="200" rx="8" fill="url(#bg)"/>
  <rect x="0" y="0" width="800" height="200" rx="8" stroke="#1E293B" stroke-width="1.5"/>

  <!-- Small Polaris star icon, inline with text -->
  <g transform="translate(56, 82)">
    <!-- Subtle glow -->
    <circle cx="0" cy="0" r="16" fill="#FDE68A" opacity="0.12"/>
    <circle cx="0" cy="0" r="10" fill="#FDE68A" opacity="0.18"/>

    <!-- Four-pointed star -->
    <polygon points="0,-18 5,-5 18,0 5,5 0,18 -5,5 -18,0 -5,-5" fill="url(#star)" opacity="0.95"/>

    <!-- Inner diamond -->
    <polygon points="0,-6 4,0 0,6 -4,0" fill="#FFF7ED" opacity="0.9"/>
  </g>

  <!-- POLARIS title -->
  <text x="96" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="#F8FAFC" letter-spacing="4">POLARIS</text>

  <!-- Decorative dot between star and title -->
  <circle cx="88" cy="68" r="1.5" fill="#6366F1" opacity="0.5"/>

  <!-- Tagline -->
  <text x="96" y="112" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#94A3B8" letter-spacing="1.5">NAVIGATE COMPLEXITY WITH AI</text>

  <!-- Bottom accent line -->
  <rect x="56" y="140" width="688" height="1" fill="#1E293B"/>
  <rect x="96" y="140" width="120" height="1.5" fill="#6366F1" opacity="0.5"/>

  <!-- Bottom meta text -->
  <text x="56" y="170" font-family="monospace" font-size="11" fill="#475569" letter-spacing="0.5">AUTONOMOUS AGENT FRAMEWORK  ·  OODA LOOP  ·  MCP  ·  A2A</text>
</svg>