<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0B1120"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="40%" stop-color="#FACC15"/>
      <stop offset="100%" stop-color="#EAB308"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0"/>
      <stop offset="20%" stop-color="#6366F1" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#6366F1" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1600" height="300" rx="10" fill="url(#bg)"/>
  <rect x="0" y="0" width="1600" height="300" rx="10" stroke="#1E293B" stroke-width="1.5"/>

  <!-- Robot at Computer icon — centered above text -->
  <g transform="translate(800, 68)">
    <!-- Laptop screen -->
    <rect x="-32" y="-36" width="64" height="42" rx="5" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
    <!-- Screen content — code lines -->
    <rect x="-24" y="-28" width="28" height="2.5" rx="1" fill="#6366F1" opacity="0.6"/>
    <rect x="-24" y="-22" width="18" height="2.5" rx="1" fill="#94A3B8" opacity="0.4"/>
    <rect x="-24" y="-16" width="22" height="2.5" rx="1" fill="#94A3B8" opacity="0.3"/>
    <rect x="-24" y="-10" width="14" height="2.5" rx="1" fill="#94A3B8" opacity="0.25"/>
    <!-- Screen glow -->
    <rect x="-32" y="-36" width="64" height="42" rx="5" fill="#6366F1" opacity="0.06"/>

    <!-- Laptop base -->
    <rect x="-44" y="8" width="88" height="5" rx="2.5" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <rect x="-38" y="13" width="76" height="2.5" rx="1.2" fill="#0F172A" stroke="#1E293B" stroke-width="0.5"/>

    <!-- Robot body -->
    <rect x="38" y="-18" width="24" height="28" rx="6" fill="url(#gold)" opacity="0.9"/>
    <!-- Robot head -->
    <rect x="36" y="-38" width="28" height="22" rx="6" fill="url(#gold)" opacity="0.95"/>
    <!-- Antenna -->
    <line x1="50" y1="-38" x2="50" y2="-46" stroke="#FACC15" stroke-width="2" stroke-linecap="round"/>
    <circle cx="50" cy="-48" r="3" fill="#FDE68A"/>
    <!-- Robot eyes -->
    <circle cx="44" cy="-30" r="3" fill="#0F172A"/>
    <circle cx="56" cy="-30" r="3" fill="#0F172A"/>
    <!-- Eye glow -->
    <circle cx="44" cy="-30" r="1.2" fill="#67E8F9"/>
    <circle cx="56" cy="-30" r="1.2" fill="#67E8F9"/>
    <!-- Robot mouth -->
    <rect x="46" y="-22" width="8" height="2" rx="1" fill="#0F172A" opacity="0.6"/>
    <!-- Robot arms reaching toward laptop -->
    <line x1="38" y1="-10" x2="28" y2="-14" stroke="#FACC15" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <line x1="38" y1="-2" x2="28" y2="0" stroke="#FACC15" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <!-- Robot hands -->
    <circle cx="28" cy="-14" r="3.5" fill="#EAB308" opacity="0.7"/>
    <circle cx="28" cy="0" r="3.5" fill="#EAB308" opacity="0.7"/>
  </g>

  <!-- Title -->
  <text x="800" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#F8FAFC" letter-spacing="5">Polaris Agent</text>

  <!-- Tagline — slightly larger -->
  <text x="800" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#94A3B8" letter-spacing="2">Navigate Complexity with AI</text>

  <!-- Accent divider -->
  <line x1="500" y1="230" x2="1100" y2="230" stroke="url(#accent)" stroke-width="1.5"/>

  <!-- Framework description -->
  <text x="800" y="265" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#64748B" letter-spacing="1">Autonomous Agent Framework — OODA Loop · MCP · A2A · 26 Tools</text>

  <!-- Bottom provider line -->
  <text x="800" y="290" text-anchor="middle" font-family="monospace" font-size="11" fill="#475569" letter-spacing="0.5">OPENAI · ANTHROPIC · OLLAMA · vLLM</text>
</svg>