<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0B1120"/>
    </linearGradient>
    <linearGradient id="star" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="40%" stop-color="#FACC15"/>
      <stop offset="100%" stop-color="#EAB308"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0"/>
      <stop offset="10%" stop-color="#6366F1" stop-opacity="0.7"/>
      <stop offset="90%" stop-color="#6366F1" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="300" rx="10" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="300" rx="10" stroke="#1E293B" stroke-width="1.5"/>

  <!-- Polaris star icon -->
  <g transform="translate(80, 150)">
    <circle cx="0" cy="0" r="22" fill="#FDE68A" opacity="0.08"/>
    <circle cx="0" cy="0" r="14" fill="#FDE68A" opacity="0.14"/>
    <polygon points="0,-24 7,-7 24,0 7,7 0,24 -7,7 -24,0 -7,-7" fill="url(#star)" opacity="0.95"/>
    <polygon points="0,-8 5,0 0,8 -5,0" fill="#FFF7ED" opacity="0.9"/>
  </g>

  <!-- POLARIS title — large, dominant -->
  <text x="130" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="#F8FAFC" letter-spacing="6">POLARIS</text>

  <!-- Decorative dot -->
  <circle cx="120" cy="130" r="2" fill="#6366F1" opacity="0.6"/>

  <!-- Tagline — inside the logo, below the title -->
  <text x="130" y="192" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#94A3B8" letter-spacing="2">NAVIGATE COMPLEXITY WITH AI</text>

  <!-- Accent line below tagline -->
  <line x1="130" y1="210" x2="1120" y2="210" stroke="url(#accent)" stroke-width="1"/>

  <!-- Bottom tech line -->
  <text x="130" y="250" font-family="monospace" font-size="13" fill="#475569" letter-spacing="1">AUTONOMOUS AGENT FRAMEWORK  ·  OODA LOOP  ·  MCP  ·  A2A  ·  26 TOOLS</text>
</svg>