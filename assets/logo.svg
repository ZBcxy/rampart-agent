<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0B1120"/>
    </linearGradient>
    <linearGradient id="rFront" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="rSide" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="rTop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0"/>
      <stop offset="20%" stop-color="#3B82F6" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#3B82F6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1600" height="300" rx="10" fill="url(#bg)"/>
  <rect x="0" y="0" width="1600" height="300" rx="10" stroke="#1E293B" stroke-width="1.5"/>

  <!-- 3D R Letter -->
  <g transform="translate(170, 42)">
    <!-- R shadow -->
    <g opacity="0.15">
      <rect x="18" y="18" width="22" height="182" fill="#000"/>
      <rect x="18" y="18" width="148" height="22" fill="#000"/>
      <rect x="148" y="18" width="22" height="82" fill="#000"/>
      <rect x="100" y="100" width="70" height="100" fill="#000"/>
    </g>

    <!-- R Top face -->
    <polygon points="0,0 170,0 192,20 22,20" fill="url(#rTop)"/>

    <!-- R Front face -->
    <rect x="0" y="0" width="170" height="22" fill="url(#rFront)"/>
    <rect x="0" y="22" width="170" height="22" fill="url(#rFront)"/>

    <!-- R Right side face (3D depth) -->
    <polygon points="170,0 192,20 192,42 170,22" fill="url(#rSide)"/>
    <polygon points="170,22 192,42 192,64 170,44" fill="url(#rSide)"/>

    <!-- R vertical stem Front -->
    <rect x="0" y="0" width="22" height="180" fill="url(#rFront)"/>

    <!-- R vertical stem Right side -->
    <rect x="22" y="20" width="22" height="180" fill="url(#rSide)"/>

    <!-- R vertical stem Top face -->
    <polygon points="0,0 22,0 44,20 22,20" fill="url(#rTop)"/>

    <!-- R top horizontal bar Front -->
    <rect x="22" y="0" width="148" height="22" fill="url(#rFront)"/>

    <!-- R top horizontal bar Right side -->
    <rect x="170" y="20" width="22" height="22" fill="url(#rSide)"/>

    <!-- R bottom leg (diagonal) Front -->
    <polygon points="60,44 170,44 170,66 60,66" fill="url(#rFront)"/>

    <!-- R bottom leg top face -->
    <polygon points="60,44 170,44 192,64 82,64" fill="url(#rTop)"/>

    <!-- R bottom leg right side -->
    <polygon points="170,44 192,64 192,86 170,66" fill="url(#rSide)"/>

    <!-- R bowl Front -->
    <rect x="22" y="88" width="80" height="112" fill="url(#rFront)"/>

    <!-- R bowl Right side -->
    <rect x="102" y="108" width="22" height="92" fill="url(#rSide)"/>

    <!-- R bowl Top face -->
    <polygon points="22,88 102,88 124,108 44,108" fill="url(#rTop)"/>

    <!-- R bowl inner cutout Front -->
    <rect x="44" y="110" width="36" height="68" fill="#0F172A"/>

    <!-- R bowl inner cutout right side -->
    <rect x="80" y="130" width="22" height="48" fill="#0B1120"/>

    <!-- R leg extension Front -->
    <polygon points="82,110 170,66 170,88 82,132" fill="url(#rFront)"/>

    <!-- R leg extension right side -->
    <polygon points="170,66 192,86 192,108 170,88" fill="url(#rSide)"/>

    <!-- R leg extension top -->
    <polygon points="82,110 170,66 192,86 104,130" fill="url(#rTop)"/>

    <!-- Amber accent dot on R -->
    <g filter="url(#glow)">
      <circle cx="154" cy="154" r="10" fill="url(#amberGrad)"/>
    </g>
  </g>

  <!-- Vertical divider -->
  <line x1="440" y1="70" x2="440" y2="230" stroke="#1E293B" stroke-width="1.5"/>

  <!-- Title -->
  <text x="470" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="800" fill="#F8FAFC" letter-spacing="5">Rampart Agent</text>

  <!-- Tagline -->
  <text x="470" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#94A3B8" letter-spacing="2">Navigate Complexity with AI</text>

  <!-- Accent divider -->
  <line x1="470" y1="195" x2="1480" y2="195" stroke="url(#accent)" stroke-width="1.5"/>

  <!-- Framework description -->
  <text x="470" y="233" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#64748B" letter-spacing="1">Autonomous Agent Framework — OODA Loop · MCP · A2A · 26 Tools</text>

  <!-- Bottom provider line -->
  <text x="470" y="265" font-family="monospace" font-size="12" fill="#475569" letter-spacing="0.5">OPENAI · ANTHROPIC · OLLAMA · vLLM</text>
</svg>
