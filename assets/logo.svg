<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0B1120"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="40%" stop-color="#FACC15"/>
      <stop offset="100%" stop-color="#EAB308"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0"/>
      <stop offset="20%" stop-color="#6366F1" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#6366F1" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1600" height="300" rx="10" fill="url(#bg)"/>
  <rect x="0" y="0" width="1600" height="300" rx="10" stroke="#1E293B" stroke-width="1.5"/>

  <!-- Large Robot at Computer — left side -->
  <g transform="translate(200, 150)">
    <!-- Laptop screen -->
    <rect x="-56" y="-62" width="112" height="72" rx="8" fill="#1E293B" stroke="#334155" stroke-width="2"/>
    <!-- Screen content — code lines -->
    <rect x="-40" y="-50" width="50" height="4.5" rx="2" fill="#6366F1" opacity="0.7"/>
    <rect x="-40" y="-40" width="34" height="4.5" rx="2" fill="#94A3B8" opacity="0.4"/>
    <rect x="-40" y="-30" width="40" height="4.5" rx="2" fill="#94A3B8" opacity="0.35"/>
    <rect x="-40" y="-20" width="24" height="4.5" rx="2" fill="#94A3B8" opacity="0.25"/>
    <rect x="-40" y="-10" width="30" height="4.5" rx="2" fill="#94A3B8" opacity="0.2"/>
    <!-- Screen glow -->
    <rect x="-56" y="-62" width="112" height="72" rx="8" fill="#6366F1" opacity="0.05"/>

    <!-- Laptop base -->
    <path d="M-80 15 L-72 12 L72 12 L80 15 L80 20 L-80 20 Z" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
    <rect x="-68" y="20" width="136" height="4" rx="2" fill="#0F172A" stroke="#1E293B" stroke-width="0.8"/>

    <!-- Robot body -->
    <rect x="62" y="-24" width="40" height="48" rx="10" fill="url(#gold)" opacity="0.92"/>
    <!-- Chest panel -->
    <rect x="74" y="-12" width="16" height="10" rx="3" fill="#0F172A" opacity="0.3"/>
    <circle cx="82" cy="-7" r="2.5" fill="#67E8F9" opacity="0.5"/>

    <!-- Robot head -->
    <rect x="54" y="-68" width="56" height="44" rx="11" fill="url(#gold)" opacity="0.95"/>
    <!-- Antenna -->
    <line x1="82" y1="-68" x2="82" y2="-84" stroke="#FACC15" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="82" cy="-88" r="6" fill="#FDE68A"/>
    <circle cx="82" cy="-88" r="3" fill="#FEF3C7"/>

    <!-- Eyes -->
    <rect x="64" y="-56" width="14" height="14" rx="3" fill="#0F172A"/>
    <rect x="86" y="-56" width="14" height="14" rx="3" fill="#0F172A"/>
    <!-- Eye highlights -->
    <rect x="67" y="-53" width="5" height="5" rx="1.5" fill="#67E8F9"/>
    <rect x="89" y="-53" width="5" height="5" rx="1.5" fill="#67E8F9"/>
    <!-- Mouth -->
    <rect x="74" y="-36" width="16" height="4" rx="2" fill="#0F172A" opacity="0.5"/>
    <!-- Ear bolts -->
    <rect x="48" y="-52" width="7" height="12" rx="2" fill="#EAB308" opacity="0.8"/>
    <rect x="109" y="-52" width="7" height="12" rx="2" fill="#EAB308" opacity="0.8"/>

    <!-- Robot arms reaching toward laptop -->
    <path d="M62 -12 Q50 -16 42 -12" stroke="#EAB308" stroke-width="7" stroke-linecap="round" opacity="0.85"/>
    <path d="M62 4 Q50 8 42 12" stroke="#EAB308" stroke-width="7" stroke-linecap="round" opacity="0.85"/>
    <!-- Hands -->
    <circle cx="42" cy="-12" r="6" fill="#FACC15" opacity="0.9"/>
    <circle cx="42" cy="12" r="6" fill="#FACC15" opacity="0.9"/>
  </g>

  <!-- Vertical divider -->
  <line x1="380" y1="80" x2="380" y2="220" stroke="#1E293B" stroke-width="1.5"/>

  <!-- Title -->
  <text x="410" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="60" font-weight="800" fill="#F8FAFC" letter-spacing="5">Polaris Agent</text>

  <!-- Tagline -->
  <text x="410" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#94A3B8" letter-spacing="2">Navigate Complexity with AI</text>

  <!-- Accent divider -->
  <line x1="410" y1="200" x2="1450" y2="200" stroke="url(#accent)" stroke-width="1.5"/>

  <!-- Framework description -->
  <text x="410" y="238" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#64748B" letter-spacing="1">Autonomous Agent Framework — OODA Loop · MCP · A2A · 26 Tools</text>

  <!-- Bottom provider line -->
  <text x="410" y="270" font-family="monospace" font-size="12" fill="#475569" letter-spacing="0.5">OPENAI · ANTHROPIC · OLLAMA · vLLM</text>
</svg>