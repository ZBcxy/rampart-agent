<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0B1120"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="40%" stop-color="#FACC15"/>
      <stop offset="100%" stop-color="#EAB308"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0"/>
      <stop offset="20%" stop-color="#6366F1" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#6366F1" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1600" height="300" rx="10" fill="url(#bg)"/>
  <rect x="0" y="0" width="1600" height="300" rx="10" stroke="#1E293B" stroke-width="1.5"/>

  <!-- Robot at Computer — simple flat icon style -->
  <g transform="translate(800, 72)">
    <!-- Laptop screen -->
    <rect x="-36" y="-40" width="72" height="46" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
    <!-- Screen content — code lines -->
    <rect x="-26" y="-32" width="32" height="3" rx="1.5" fill="#6366F1" opacity="0.7"/>
    <rect x="-26" y="-25" width="22" height="3" rx="1.5" fill="#94A3B8" opacity="0.4"/>
    <rect x="-26" y="-18" width="26" height="3" rx="1.5" fill="#94A3B8" opacity="0.3"/>
    <rect x="-26" y="-11" width="16" height="3" rx="1.5" fill="#94A3B8" opacity="0.25"/>
    <!-- Screen glow -->
    <rect x="-36" y="-40" width="72" height="46" rx="6" fill="#6366F1" opacity="0.05"/>

    <!-- Laptop base -->
    <path d="M-52 10 L-48 8 L48 8 L52 10 L52 14 L-52 14 Z" fill="#1E293B" stroke="#334155" stroke-width="1.2"/>
    <rect x="-44" y="14" width="88" height="3" rx="1.5" fill="#0F172A" stroke="#1E293B" stroke-width="0.5"/>

    <!-- Robot body -->
    <rect x="41" y="-16" width="26" height="30" rx="7" fill="url(#gold)" opacity="0.92"/>
    <!-- Body detail — chest panel -->
    <rect x="49" y="-8" width="10" height="6" rx="2" fill="#0F172A" opacity="0.3"/>

    <!-- Robot head -->
    <rect x="37" y="-42" width="34" height="27" rx="8" fill="url(#gold)" opacity="0.95"/>
    <!-- Antenna -->
    <line x1="54" y1="-42" x2="54" y2="-52" stroke="#FACC15" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="54" cy="-55" r="4" fill="#FDE68A"/>
    <circle cx="54" cy="-55" r="2" fill="#FEF3C7"/>

    <!-- Robot face -->
    <!-- Eyes -->
    <rect x="44" y="-34" width="8" height="8" rx="2" fill="#0F172A"/>
    <rect x="56" y="-34" width="8" height="8" rx="2" fill="#0F172A"/>
    <!-- Eye highlights -->
    <rect x="46" y="-32" width="3" height="3" rx="1" fill="#67E8F9"/>
    <rect x="58" y="-32" width="3" height="3" rx="1" fill="#67E8F9"/>
    <!-- Mouth -->
    <rect x="48" y="-22" width="12" height="3" rx="1.5" fill="#0F172A" opacity="0.5"/>
    <!-- Ear bolts -->
    <rect x="34" y="-32" width="4" height="8" rx="1.5" fill="#EAB308" opacity="0.8"/>
    <rect x="70" y="-32" width="4" height="8" rx="1.5" fill="#EAB308" opacity="0.8"/>

    <!-- Robot arms reaching toward laptop -->
    <path d="M41 -8 Q34 -10 30 -8" stroke="#EAB308" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
    <path d="M41 0 Q34 2 30 4" stroke="#EAB308" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
    <!-- Hands -->
    <circle cx="30" cy="-8" r="4" fill="#FACC15" opacity="0.9"/>
    <circle cx="30" cy="4" r="4" fill="#FACC15" opacity="0.9"/>
  </g>

  <!-- Title -->
  <text x="800" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#F8FAFC" letter-spacing="5">Polaris Agent</text>

  <!-- Tagline -->
  <text x="800" y="212" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#94A3B8" letter-spacing="2">Navigate Complexity with AI</text>

  <!-- Accent divider -->
  <line x1="500" y1="232" x2="1100" y2="232" stroke="url(#accent)" stroke-width="1.5"/>

  <!-- Framework description -->
  <text x="800" y="265" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#64748B" letter-spacing="1">Autonomous Agent Framework — OODA Loop · MCP · A2A · 26 Tools</text>

  <!-- Bottom provider line -->
  <text x="800" y="290" text-anchor="middle" font-family="monospace" font-size="11" fill="#475569" letter-spacing="0.5">OPENAI · ANTHROPIC · OLLAMA · vLLM</text>
</svg>