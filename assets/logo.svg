<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="50%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="star" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="50%" stop-color="#FACC15"/>
      <stop offset="100%" stop-color="#EAB308"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#67E8F9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)" stroke="#1E293B" stroke-width="16"/>

  <!-- Orbital rings -->
  <ellipse cx="256" cy="256" rx="180" ry="60" stroke="url(#ring)" stroke-width="1.5" stroke-dasharray="6 8" transform="rotate(-30 256 256)" opacity="0.4"/>
  <ellipse cx="256" cy="256" rx="200" ry="50" stroke="url(#ring)" stroke-width="1" stroke-dasharray="4 12" transform="rotate(20 256 256)" opacity="0.25"/>

  <!-- Constellations dots (Big Dipper → Polaris hint) -->
  <circle cx="148" cy="180" r="3" fill="#94A3B8" opacity="0.6"/>
  <circle cx="176" cy="164" r="3" fill="#94A3B8" opacity="0.6"/>
  <circle cx="204" cy="152" r="3" fill="#94A3B8" opacity="0.7"/>
  <circle cx="200" cy="190" r="2.5" fill="#94A3B8" opacity="0.5"/>
  <circle cx="226" cy="176" r="2.5" fill="#94A3B8" opacity="0.5"/>
  <circle cx="232" cy="210" r="2" fill="#94A3B8" opacity="0.4"/>
  <circle cx="244" cy="196" r="2" fill="#94A3B8" opacity="0.4"/>

  <!-- Faint line from pointer stars to Polaris -->
  <line x1="204" y1="152" x2="256" y2="256" stroke="#64748B" stroke-width="0.5" opacity="0.3" stroke-dasharray="3 6"/>

  <!-- Polaris star — four-pointed cross pattern -->
  <g transform="translate(256, 256)">
    <!-- Glow -->
    <circle cx="0" cy="0" r="48" fill="#FDE68A" opacity="0.08"/>
    <circle cx="0" cy="0" r="32" fill="#FDE68A" opacity="0.12"/>
    <circle cx="0" cy="0" r="18" fill="#FDE68A" opacity="0.2"/>

    <!-- Main 4-pointed star -->
    <polygon points="0,-38 10,-10 38,0 10,10 0,38 -10,10 -38,0 -10,-10" fill="url(#star)" opacity="0.95"/>

    <!-- Inner diamond accent -->
    <polygon points="0,-12 8,0 0,12 -8,0" fill="#FFF7ED" opacity="0.9"/>

    <!-- Small corner rays -->
    <line x1="14" y1="-14" x2="22" y2="-22" stroke="#FDE68A" stroke-width="2" opacity="0.5"/>
    <line x1="14" y1="14" x2="22" y2="22" stroke="#FDE68A" stroke-width="2" opacity="0.5"/>
    <line x1="-14" y1="-14" x2="-22" y2="-22" stroke="#FDE68A" stroke-width="2" opacity="0.5"/>
    <line x1="-14" y1="14" x2="-22" y2="22" stroke="#FDE68A" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Text: POLARIS -->
  <text x="256" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#F8FAFC" letter-spacing="8">POLARIS</text>

  <!-- Tagline -->
  <text x="256" y="408" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#94A3B8" letter-spacing="3">NAVIGATE COMPLEXITY WITH AI</text>

  <!-- Bottom accent line -->
  <line x1="170" y1="432" x2="342" y2="432" stroke="#6366F1" stroke-width="2" opacity="0.5"/>
</svg>
