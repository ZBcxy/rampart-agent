name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        run: |
          pip install pytest pydantic pydantic-settings httpx fastapi python-dotenv requests aiohttp
      - name: Run tests
        run: PYTHONPATH=. python -m pytest tests/ -v --tb=short
